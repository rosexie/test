<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YARN 资源看板</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <header>
    <h1>YARN 资源与任务看板</h1>
    <div id="pageNav" class="page-nav"></div>
  </header>

  <main class="grid" data-page-section="dashboard">
    <section class="card full">
      <h2>分析参数</h2>
      <div class="filter-row">
        <label>统计窗口
          <select id="daysSelect">
            <option value="7">近7天</option>
            <option value="14" selected>近14天</option>
            <option value="30">近30天</option>
          </select>
        </label>
        <label>队列展示数量
          <select id="topNSelect">
            <option value="5">Top 5</option>
            <option value="8" selected>Top 8</option>
            <option value="12">Top 12</option>
          </select>
        </label>
        <label>队列趋势指标
          <select id="queueMetricSelect">
            <option value="max_used_memory_mb" selected>峰值 Max</option>
            <option value="p95_used_memory_mb">P95</option>
            <option value="min_used_memory_mb">最小值 Min</option>
          </select>
        </label>
        <button id="refreshBtn" class="primary">刷新看板</button>
      </div>
    </section>

    <section class="card full"><h2>今日概览</h2><div id="summaryCards" class="summary-grid"></div></section>
    <section class="card"><h2>队列趋势（选中指标）</h2><div class="toolbar"><button data-period="day">按天</button><button data-period="week">按周</button></div><div id="queueStats" class="chart"></div></section>
    <section class="card"><h2>队列资源总览（Peak/P95/Avg）</h2><div id="queueOverview" class="chart"></div></section>
    <section class="card full"><h2>当日集群与重点队列资源曲线</h2><div id="todayUsage" class="chart"></div></section>
    <section class="card full"><h2>每日任务量 / 成功率 / P95资源</h2><div id="dailyApps" class="chart"></div></section>
    <section class="card full"><h2>队列任务汇总（窗口内）</h2><div id="queueAppSummary"></div></section>
    <section class="card full"><h2>任务明细（最近200条）</h2><div id="appTable"></div></section>
  </main>

  <main class="grid" data-page-section="capacity-planning" style="display:none">
    <section class="card full">
      <h2>容量规划（预留页）</h2>
      <p>该页面为后续扩展位：可添加预测模型、阈值配置、告警规则和成本分析等模块。</p>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
